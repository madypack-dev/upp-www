name: CD / FTPS

on:
  workflow_run:
    workflows:
      - CI / Quality
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-ftps-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  deploy-ftps:
    name: Deploy / FTPS (${{ matrix.target }})
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    environment: production
    env:
      FTPS_TARGET_LABEL: ${{ matrix.target }}
      FTPS_SERVER: ${{ secrets[matrix.ftps_server_secret] }}
      FTPS_PORT: ${{ vars[matrix.ftps_port_var] }}
      FTPS_MODE: ${{ vars[matrix.ftps_mode_var] }}
      FTPS_USERNAME: ${{ secrets[matrix.ftps_username_secret] }}
      FTPS_PASSWORD: ${{ secrets[matrix.ftps_password_secret] }}
      FTPS_REMOTE_DIR: ${{ vars[matrix.ftps_remote_dir_var] || secrets[matrix.ftps_remote_dir_secret] }}
      FTPS_ALLOW_INSECURE_DATA_CHANNEL: ${{ vars[matrix.ftps_allow_insecure_data_channel_var] }}
      FTPS_PRUNE_REMOTE: ${{ vars.FTPS_PRUNE_REMOTE }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: datamaq
            ftps_server_secret: FTPS_DATAMAQ_SERVER
            ftps_username_secret: FTPS_DATAMAQ_USERNAME
            ftps_password_secret: FTPS_DATAMAQ_PASSWORD
            ftps_remote_dir_secret: FTPS_DATAMAQ_REMOTE_DIR
            ftps_port_var: FTPS_DATAMAQ_PORT
            ftps_mode_var: FTPS_DATAMAQ_MODE
            ftps_remote_dir_var: FTPS_DATAMAQ_REMOTE_DIR
            ftps_allow_insecure_data_channel_var: FTPS_DATAMAQ_ALLOW_INSECURE_DATA_CHANNEL
            health_url: https://datamaq.com.ar

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Preflight / Validate deploy inputs
        run: bash scripts/ftps-deploy.sh validate

      - name: Preflight / Install lftp client
        run: |
          if ! command -v lftp &> /dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq lftp
          fi

      - name: Preflight / FTPS connectivity and auth
        run: bash scripts/ftps-deploy.sh preflight

      - name: Build / Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build / Install dependencies
        run: npm ci

      - name: Build / Dist
        run: |
          set -euo pipefail
          export BUILD_OUT_DIR=dist
          npm run build -- ${{ matrix.target }}

      - name: Deploy dist via FTPS
        run: bash scripts/ftps-deploy.sh upload

      - name: Post-deploy / Health check
        run: |
          echo "Verifying deployment for ${{ matrix.target }}..."
          # Note: We use a generic check here as specific URLs might vary per target.
          # In a real scenario, we would use a target-specific health URL.
          # For now, we just check if the server responds.
          # sleep 5 # Wait for caches to clear if needed
          curl -Ifs --retry 3 --retry-delay 5 "${{ matrix.health_url }}" || echo "Warning: Health check failed or target URL not reachable."
