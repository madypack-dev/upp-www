<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="%%SEO_DESCRIPTION%%" />
    <meta name="keywords" content="%%SEO_KEYWORDS%%" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="%%SEO_AUTHOR%%" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="%%OG_TYPE%%" />
    <meta property="og:url" content="%%OG_URL%%" />
    <meta property="og:title" content="%%OG_TITLE%%" />
    <meta property="og:description" content="%%OG_DESCRIPTION%%" />
    <meta property="og:image" content="%%OG_IMAGE%%" />
    <meta property="og:locale" content="%%OG_LOCALE%%" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="%%TWITTER_CARD%%" />
    <meta name="twitter:title" content="%%TWITTER_TITLE%%" />
    <meta name="twitter:description" content="%%TWITTER_DESCRIPTION%%" />
    
    <!-- Canonical -->
    <link rel="canonical" href="%%CANONICAL_URL%%" />
    
    <!-- Geolocation -->
    <meta name="geo.placename" content="%%GEO_PLACENAME%%" />
    <meta name="geo.region" content="%%GEO_REGION%%" />
    <meta name="geo.position" content="%%GEO_POSITION%%" />
    <meta name="ICBM" content="%%GEO_COORDINATES%%" />
    
    <title>%%SEO_PAGE_TITLE%%</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- JSON-LD Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "%%BUSINESS_TYPE%%",
      "name": "%%ORG_NAME%%",
      "image": ["%%OG_IMAGE%%"],
      "description": "%%SEO_DESCRIPTION%%",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "%%ORG_ADDRESS_STREET%%",
        "addressLocality": "%%ORG_ADDRESS_LOCALITY%%",
        "addressRegion": "%%ORG_ADDRESS_REGION%%",
        "postalCode": "%%ORG_ADDRESS_POSTAL%%",
        "addressCountry": "%%ORG_ADDRESS_COUNTRY%%"
      },
      "telephone": "%%ORG_TELEPHONE%%",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Sales",
        "telephone": "%%ORG_TELEPHONE%%",
        "areaServed": "%%ORG_ADDRESS_COUNTRY%%"
      },
      "url": "%%OG_URL%%",
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "%%ORG_GEO_LAT%%",
        "longitude": "%%ORG_GEO_LON%%"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Argentina"
      },
      "openingHoursSpecification": %%OPENING_HOURS_JSON%%,
      "priceRange": "%%PRICE_RANGE%%",
      "knowsAbout": %%KNOWS_ABOUT%%,
      "additionalType": "%%ADDITIONAL_TYPE%%",
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
